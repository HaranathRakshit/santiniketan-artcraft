<svg width="300" height="80" viewBox="0 0 300 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="300" height="80" fill="#e6f3ff"/>
  
  <!-- Traditional Craft Elements -->
  <g transform="translate(20, 15)">
    <!-- Pottery Wheel -->
    <circle cx="25" cy="25" r="20" fill="none" stroke="#4a90e2" stroke-width="2"/>
    <circle cx="25" cy="25" r="15" fill="none" stroke="#4a90e2" stroke-width="1" stroke-dasharray="2,2"/>
    
    <!-- Clay Pot -->
    <ellipse cx="25" cy="35" rx="8" ry="3" fill="none" stroke="#4a90e2" stroke-width="2"/>
    <path d="M 17 35 Q 17 40 25 40 Q 33 40 33 35" fill="none" stroke="#4a90e2" stroke-width="2"/>
    
    <!-- Weaving Loom -->
    <rect x="45" y="10" width="25" height="30" fill="none" stroke="#4a90e2" stroke-width="2"/>
    <line x1="45" y1="20" x2="70" y2="20" stroke="#4a90e2" stroke-width="1"/>
    <line x1="45" y1="25" x2="70" y2="25" stroke="#4a90e2" stroke-width="1"/>
    <line x1="45" y1="30" x2="70" y2="30" stroke="#4a90e2" stroke-width="1"/>
    
    <!-- Bamboo Craft -->
    <line x1="80" y1="15" x2="80" y2="35" stroke="#4a90e2" stroke-width="3"/>
    <line x1="85" y1="18" x2="85" y2="32" stroke="#4a90e2" stroke-width="2"/>
    <line x1="90" y1="20" x2="90" y2="30" stroke="#4a90e2" stroke-width="2"/>
    
    <!-- Traditional Pattern -->
    <path d="M 100 15 Q 105 20 100 25 Q 95 20 100 15" fill="none" stroke="#4a90e2" stroke-width="1"/>
    <path d="M 105 18 Q 110 23 105 28 Q 100 23 105 18" fill="none" stroke="#4a90e2" stroke-width="1"/>
    <path d="M 110 15 Q 115 20 110 25 Q 105 20 110 15" fill="none" stroke="#4a90e2" stroke-width="1"/>
  </g>
  
  <!-- Bengali Text -->
  <text x="130" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c5aa0">শান্তিনিকেতন</text>
  <text x="130" y="40" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c5aa0">শিল্পকর্ম</text>
  
  <!-- English Text -->
  <text x="130" y="55" font-family="Arial, sans-serif" font-size="10" fill="#2c5aa0">SANTINIKETAN ARTCRAFT</text>
  
  <!-- Decorative Border -->
  <rect x="5" y="5" width="290" height="70" fill="none" stroke="#4a90e2" stroke-width="1" rx="5"/>
</svg> 